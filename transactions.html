<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>거래 관리 — 추급권 정산 플랫폼</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen" data-page="transactions">
  <div id="nav"></div>
  <main class="max-w-7xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-slate-800">거래 관리 <span class="text-sm font-normal text-slate-400">(A-07)</span></h1>
      <div class="flex gap-2">
        <a href="register.html" class="px-4 py-2 bg-teal-600 text-white rounded-lg text-sm hover:bg-teal-700 font-medium">➕ 거래 등록하기</a>
        <button onclick="exportCSV()" class="px-4 py-2 bg-white border rounded-lg text-sm hover:bg-gray-50">📥 엑셀 다운로드</button>
      </div>
    </div>

    <!-- 필터 -->
    <div class="bg-white rounded-xl border p-4 mb-6 flex flex-wrap gap-4 items-end">
      <div>
        <label class="block text-xs text-slate-500 mb-1">상태</label>
        <select id="f-status" class="border rounded-lg px-3 py-1.5 text-sm" onchange="renderTable()">
          <option value="">전체</option>
          <option value="납부완료">납부완료</option>
          <option value="신고완료">신고완료</option>
          <option value="미신고">미신고</option>
          <option value="미적용">미적용</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-slate-500 mb-1">작가</label>
        <input id="f-artist" type="text" placeholder="작가명" class="border rounded-lg px-3 py-1.5 text-sm w-32" oninput="renderTable()">
      </div>
      <div>
        <label class="block text-xs text-slate-500 mb-1">최소 금액</label>
        <select id="f-min" class="border rounded-lg px-3 py-1.5 text-sm" onchange="renderTable()">
          <option value="0">전체</option>
          <option value="50000000">5천만 이상</option>
          <option value="100000000">1억 이상</option>
          <option value="500000000">5억 이상</option>
          <option value="1000000000">10억 이상</option>
        </select>
      </div>
      <div class="text-sm text-slate-400" id="f-count"></div>
    </div>

    <!-- 테이블 -->
    <div class="bg-white rounded-xl border overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-3 py-3 text-left font-medium text-slate-500">거래일</th>
              <th class="px-3 py-3 text-left font-medium text-slate-500">작가</th>
              <th class="px-3 py-3 text-left font-medium text-slate-500">작품</th>
              <th class="px-3 py-3 text-left font-medium text-slate-500">거래처</th>
              <th class="px-3 py-3 text-right font-medium text-slate-500">낙찰가</th>
              <th class="px-3 py-3 text-right font-medium text-slate-500">추급권료</th>
              <th class="px-3 py-3 text-center font-medium text-slate-500">적용</th>
              <th class="px-3 py-3 text-center font-medium text-slate-500">상태</th>
              <th class="px-3 py-3 text-center font-medium text-slate-500">액션</th>
            </tr>
          </thead>
          <tbody id="tx-table" class="divide-y"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- 인보이스/신고서 숨겨진 영역 (PDF용) -->
  <div id="pdf-container" class="hidden"></div>

  <script src="js/arr-engine.js"></script>
  <script src="js/app.js"></script>
  <script>
  let allTxs = [];

  function initPage() {
    allTxs = enrichTransactions();
    renderTable();
  }

  function getFiltered() {
    let data = [...allTxs];
    const status = document.getElementById('f-status').value;
    const artist = document.getElementById('f-artist').value.toLowerCase();
    const minPrice = parseInt(document.getElementById('f-min').value) || 0;
    if (status) data = data.filter(t => t.reportStatus === status);
    if (artist) data = data.filter(t => t.artistName.toLowerCase().includes(artist));
    if (minPrice) data = data.filter(t => t.salePrice >= minPrice);
    return data.sort((a, b) => b.saleDate.localeCompare(a.saleDate));
  }

  function renderTable() {
    const data = getFiltered();
    document.getElementById('f-count').textContent = `${data.length}건`;
    document.getElementById('tx-table').innerHTML = data.map(t => `
      <tr class="hover:bg-gray-50">
        <td class="px-3 py-2.5 text-slate-600 text-xs">${t.saleDate}</td>
        <td class="px-3 py-2.5 font-medium text-slate-800">${t.artistName}</td>
        <td class="px-3 py-2.5 text-slate-600 max-w-[180px] truncate" title="${t.title}">${t.title}</td>
        <td class="px-3 py-2.5 text-slate-500 text-xs">${t.venue}</td>
        <td class="px-3 py-2.5 text-right font-medium">${formatKRW(t.salePrice)}</td>
        <td class="px-3 py-2.5 text-right ${t.eligibility.eligible ? 'text-teal-600 font-medium' : 'text-slate-300'}">${t.eligibility.eligible ? formatKRW(t.royalty.totalRoyalty) : '—'}</td>
        <td class="px-3 py-2.5 text-center">${eligibilityBadge(t.eligibility.eligible)}</td>
        <td class="px-3 py-2.5 text-center">${statusBadge(t.reportStatus)}</td>
        <td class="px-3 py-2.5 text-center">
          ${t.eligibility.eligible ? `
            <button onclick="showInvoice('${t.id}')" class="text-xs text-blue-600 hover:underline mr-2">인보이스</button>
            <button onclick="showReport('${t.id}')" class="text-xs text-teal-600 hover:underline">신고서</button>
          ` : '<span class="text-xs text-slate-300">—</span>'}
        </td>
      </tr>
    `).join('');
  }

  function showInvoice(txId) {
    const t = allTxs.find(x => x.id === txId);
    if (!t) return;
    const inv = generateInvoice(t, t.royalty);
    const html = `
      <div id="invoice-pdf" class="p-6 bg-white" style="font-family: sans-serif;">
        <div class="flex justify-between items-start mb-8">
          <div>
            <div class="text-2xl font-bold text-slate-800">INVOICE</div>
            <div class="text-sm text-slate-500">${inv.invoiceNo}</div>
          </div>
          <div class="text-right text-sm text-slate-500">
            <div>Seoul Auction Blue</div>
            <div>${inv.date}</div>
          </div>
        </div>
        <div class="mb-6 p-4 bg-gray-50 rounded-lg text-sm">
          <div><strong>작가:</strong> ${inv.artist}</div>
          <div><strong>작품:</strong> ${inv.title} (${inv.year})</div>
          <div><strong>매체:</strong> ${inv.medium}</div>
          <div><strong>거래처:</strong> ${inv.venue}</div>
        </div>
        <table class="w-full text-sm mb-6">
          <tr class="border-b"><td class="py-3 text-slate-600">낙찰가 (Hammer Price)</td><td class="py-3 text-right">₩ ${formatNumber(inv.salePrice)}</td></tr>
          <tr class="border-b"><td class="py-3 text-slate-600">바이어 프리미엄 (${(inv.buyerPremiumRate*100)}%)</td><td class="py-3 text-right">₩ ${formatNumber(inv.buyerPremium)}</td></tr>
          <tr class="border-b bg-teal-50"><td class="py-3 text-teal-700 font-semibold">추급권료 (ARR ${inv.arrRate}%)</td><td class="py-3 text-right text-teal-700 font-semibold">₩ ${formatNumber(inv.arrRoyalty)}</td></tr>
          <tr class="text-lg font-bold"><td class="py-4">합계 (Total)</td><td class="py-4 text-right">₩ ${formatNumber(inv.total)}</td></tr>
        </table>
        <p class="text-xs text-slate-400 border-t pt-3">${inv.legalNote}</p>
      </div>`;
    showModal(`인보이스 — ${inv.invoiceNo}`, html + `
      <div class="mt-4 text-right">
        <button onclick="generatePDF('invoice-pdf','${inv.invoiceNo}.pdf')" class="px-4 py-2 bg-teal-600 text-white rounded-lg text-sm hover:bg-teal-700">PDF 다운로드</button>
      </div>`);
  }

  function showReport(txId) {
    const t = allTxs.find(x => x.id === txId);
    if (!t) return;
    const rpt = generateReport(t, t.artist, t.royalty);
    const html = `
      <div id="report-pdf" class="p-6 bg-white" style="font-family: sans-serif;">
        <div class="text-center mb-6">
          <div class="text-xl font-bold text-slate-800">추급권 거래 신고서</div>
          <div class="text-sm text-slate-500">${rpt.reportNo} | ${rpt.reportDate}</div>
        </div>
        <h3 class="font-bold text-sm text-slate-700 mb-2 mt-4">1. 작품 정보</h3>
        <table class="w-full text-sm mb-4 border">
          <tr class="border-b"><td class="p-2 bg-gray-50 w-28 font-medium">작품명</td><td class="p-2">${rpt.artwork.title}</td></tr>
          <tr class="border-b"><td class="p-2 bg-gray-50 font-medium">작가</td><td class="p-2">${rpt.artwork.artist}</td></tr>
          <tr class="border-b"><td class="p-2 bg-gray-50 font-medium">제작년도</td><td class="p-2">${rpt.artwork.year}</td></tr>
          <tr><td class="p-2 bg-gray-50 font-medium">매체</td><td class="p-2">${rpt.artwork.medium}</td></tr>
        </table>
        <h3 class="font-bold text-sm text-slate-700 mb-2">2. 거래 정보</h3>
        <table class="w-full text-sm mb-4 border">
          <tr class="border-b"><td class="p-2 bg-gray-50 w-28 font-medium">판매가</td><td class="p-2">₩ ${formatNumber(rpt.transaction.salePrice)}</td></tr>
          <tr class="border-b"><td class="p-2 bg-gray-50 font-medium">거래일</td><td class="p-2">${rpt.transaction.saleDate}</td></tr>
          <tr class="border-b"><td class="p-2 bg-gray-50 font-medium">거래처</td><td class="p-2">${rpt.transaction.venue}</td></tr>
          <tr><td class="p-2 bg-gray-50 font-medium">유형</td><td class="p-2">${rpt.transaction.saleType}</td></tr>
        </table>
        <h3 class="font-bold text-sm text-slate-700 mb-2">3. 추급권료 산정</h3>
        <table class="w-full text-sm mb-4 border">
          <tr class="border-b"><td class="p-2 bg-gray-50 w-28 font-medium">추급권료</td><td class="p-2 font-bold text-teal-700">₩ ${formatNumber(rpt.royalty.amount)}</td></tr>
          <tr><td class="p-2 bg-gray-50 font-medium">적용 비율</td><td class="p-2">${rpt.royalty.effectiveRate}%</td></tr>
        </table>
        <p class="text-xs text-slate-400 mt-4">법적 근거: ${rpt.legalBasis}</p>
      </div>`;
    showModal(`거래 신고서 — ${rpt.reportNo}`, html + `
      <div class="mt-4 text-right">
        <button onclick="generatePDF('report-pdf','${rpt.reportNo}.pdf')" class="px-4 py-2 bg-teal-600 text-white rounded-lg text-sm hover:bg-teal-700">PDF 다운로드</button>
      </div>`);
  }

  function exportCSV() {
    const data = getFiltered().map(t => ({
      거래일: t.saleDate, 작가: t.artistName, 작품: t.title, 거래처: t.venue,
      낙찰가: t.salePrice, 추급권료: t.eligibility.eligible ? t.royalty.totalRoyalty : 0,
      적용여부: t.eligibility.eligible ? 'O' : 'X', 상태: t.reportStatus
    }));
    downloadCSV(data, '추급권_거래목록.csv');
  }
  </script>
</body>
</html>
